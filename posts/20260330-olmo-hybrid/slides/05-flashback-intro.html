<!DOCTYPE html>
<html><head><style>
body { width: 720pt; height: 405pt; margin: 0; padding: 0; background: %%BG%%; font-family: %%FONT%%; display: flex; flex-direction: column; justify-content: center; align-items: center; }
.accent-bar { position: absolute; top: 0; left: 0; width: 100%; height: 50pt; background: %%ACCENT%%; }

<div class="accent-bar"></div>

  <p class="arrow">→</p>

  <div class="step"><p class="year">2025</p><p class="name">+ Neg. Eigenvalues</p></div>

  <div class="step" style="background: #E3F2FD; border-radius: 4pt;"><p class="year">2026</p><p class="name"><b>OLMo Hybrid</b></p></div>
</div>
<img src="%%LOGO%%" style="position: absolute; bottom: 10pt; right: 20pt; width: 50pt; height: auto; opacity: %%LOGO_OPACITY%%;">
